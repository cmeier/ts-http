  <title
     id="title">ts-http package architecture</title>
  <desc
     id="desc">A shared TypeScript contract sits between client and server. Client and server both reference the contract. The contract and client use @ts-http/core, the server uses @ts-http/express or @ts-http/nestjs, and @ts-http/openapi is an optional extension for Swagger UI and clients beyond TypeScript.</desc>
